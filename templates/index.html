<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard — Phishing URL Detector</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>🛡️ PhishGuard</h1>
        <p>Detect phishing URLs instantly. Stay safe online.</p>
    </div>

    <!-- Scanner Input Card -->
    <div class="card">
        <div class="input-group">
            <input
                type="text"
                class="url-input"
                id="urlInput"
                placeholder="Paste a URL to scan... e.g. http://paypal-verify.tk/login"
            />
            <button class="scan-btn" id="scanBtn" onclick="scanURL()">🔍 Scan</button>
        </div>
    </div>

    <!-- Loading Indicator -->
    <div class="loading" id="loading">⏳ Scanning URL...</div>

    <!-- Results Card -->
    <div class="card results-card" id="resultsCard">

        <!-- Verdict -->
        <div class="verdict-banner" id="verdictBanner">
            <div class="verdict-label"  id="verdictLabel"></div>
            <div class="verdict-message" id="verdictMessage"></div>
        </div>

        <!-- Score Bar -->
        <div class="score-section">
            <div class="score-header">
                <span>Threat Score</span>
                <span id="scoreText"></span>
            </div>
            <div class="score-bar">
                <div class="score-fill" id="scoreFill"></div>
            </div>
        </div>

        <!-- Check Breakdown -->
        <div class="breakdown-title">Check Breakdown</div>
        <div id="checksList"></div>

    </div>

    <div class="footer">Built with Python + Flask &nbsp;·&nbsp; PhishGuard v1.0</div>

    <script>
        // ── Main Scan Function ──
        async function scanURL() {
            const url    = document.getElementById("urlInput").value.trim();
            const btn    = document.getElementById("scanBtn");
            const loader = document.getElementById("loading");
            const card   = document.getElementById("resultsCard");

            if (!url) { alert("Please enter a URL to scan."); return; }

            // Show loading state
            btn.disabled     = true;
            btn.textContent  = "Scanning...";
            loader.style.display = "block";
            card.classList.remove("visible");

            try {
                const res  = await fetch("/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                displayResults(data);
            } catch (err) {
                alert("Something went wrong. Make sure Flask is running.");
            } finally {
                btn.disabled    = false;
                btn.textContent = "🔍 Scan";
                loader.style.display = "none";
            }
        }

        // ── Display Results ──
        function displayResults(data) {
            const cls = data.verdict === "Safe"
                ? "safe" : data.verdict === "Suspicious"
                ? "suspicious" : "dangerous";

            const icons = { safe: "✅", suspicious: "⚠️", dangerous: "🚨" };

            // Verdict banner
            document.getElementById("verdictBanner").className = `verdict-banner ${cls}`;
            document.getElementById("verdictLabel").textContent  = `${icons[cls]} ${data.verdict}`;
            document.getElementById("verdictMessage").textContent = data.message;

            // Score bar
            const pct = (data.total_score / data.max_score) * 100;
            document.getElementById("scoreText").textContent = `${data.total_score} / ${data.max_score}`;
            const fill = document.getElementById("scoreFill");
            fill.className = `score-fill ${cls}`;
            setTimeout(() => { fill.style.width = pct + "%"; }, 50);

            // Check breakdown
            const list = document.getElementById("checksList");
            list.innerHTML = data.checks.map(c => {
                const icon      = c.result === "PASS" ? "✅" : c.result === "WARNING" ? "⚠️" : "❌";
                const scoreCSS  = c.score === 0 ? "score-zero" : "score-nonzero";
                return `
                <div class="check-item">
                    <div class="check-left">
                        <span class="check-icon">${icon}</span>
                        <div>
                            <div class="check-name">${c.check}</div>
                            <div class="check-reason">${c.reason}</div>
                        </div>
                    </div>
                    <span class="check-score ${scoreCSS}">+${c.score}</span>
                </div>`;
            }).join("");

            document.getElementById("resultsCard").classList.add("visible");
        }

        // ── Press Enter to Scan ──
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("urlInput")
                .addEventListener("keypress", e => { if (e.key === "Enter") scanURL(); });
        });
    </script>

</body>
</html>
